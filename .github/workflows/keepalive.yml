name: Supabase keepalive

# Gratis Supabase-projecten pauzeren na ~1 week zonder verkeer.
# Deze ping om de 3 dagen houdt het project wakker.
on:
  schedule:
    - cron: '17 3 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "https://anglxcniiktoenoqapqz.supabase.co/rest/v1/paklijst_shared?select=id&limit=1" \
            -H "apikey: sb_publishable_qyGsqcHIofui-1rI0WZadQ_cb91iv26" \
            -H "Authorization: Bearer sb_publishable_qyGsqcHIofui-1rI0WZadQ_cb91iv26" \
            -o /dev/null
